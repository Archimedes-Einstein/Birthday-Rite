<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthrite | {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <a href="/" class="logo">Birthrite<span>.</span></a>
            <div class="nav-links">
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
                {% if user_logged_in %}
                    <a href="/dashboard" class="btn-dash">Dashboard</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/signup" class="btn-primary">Get Started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <h3>Birthrite.</h3>
                <p>Digital legacies for the ones you love.</p>
            </div>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="/contact">Support</a>
            </div>
        </div>
        <p class="copyright">&copy; 2026 Birthrite. Made with ❤️ in Enugu.</p>
    </footer>
</body>
</html>
